<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2E7D32" />
    <meta name="description" content="Agricultural Blockchain Traceability System" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>AgriTrace PWA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service worker is only useful in true production deployments.
      // On localhost and all ngrok tunnel hostnames we unregister any existing
      // SW (to clear stale caches) and skip registration entirely — the Vite
      // proxy handles /api forwarding in dev, and the SW interferes with HMR.
      const h = location.hostname;
      const isDev = h === 'localhost'
                 || h === '127.0.0.1'
                 || h.endsWith('.ngrok-free.app')
                 || h.endsWith('.ngrok.io')
                 || h.endsWith('.ngrok.app');

      if ('serviceWorker' in navigator) {
        if (isDev) {
          // Tear down any previously registered SW so it can no longer
          // intercept requests and serve stale responses.
          navigator.serviceWorker.getRegistrations().then(regs => {
            regs.forEach(r => r.unregister());
          });
        } else {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(r  => console.log('SW registered:', r.scope))
              .catch(e => console.warn('SW registration failed:', e));
          });
        }
      }
    </script>
  </body>
</html>
