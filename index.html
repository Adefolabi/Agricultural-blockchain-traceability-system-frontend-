<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2E7D32" />
    <meta name="description" content="Agricultural Blockchain Traceability System" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>AgriTrace PWA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Only register the service worker in production.
      // In development the SW caches Vite's module files and serves stale
      // versions on reload, causing a blank white page.
      const isDev = location.hostname === 'localhost'
                 || location.hostname === '127.0.0.1'
                 || location.hostname.endsWith('.ngrok-free.app')
                 || location.hostname.endsWith('.ngrok.io');
      if ('serviceWorker' in navigator && !isDev) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
